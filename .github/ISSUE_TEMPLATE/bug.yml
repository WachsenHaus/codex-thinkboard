name: Bug report
description: Report a reproducible Thinkboard problem.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Thinkboard. Use synthetic data whenever possible.

  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: codex-cli 0.144.0
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Thinkboard version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Codex surface (desktop, CLI, IDE, or cloud).
      placeholder: Windows 11, Codex desktop
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: List the smallest sequence that reproduces the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed names, private thoughts, prompts, API keys, tokens, and sensitive local paths.
          required: true

  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This is not a vulnerability. I will use Private Vulnerability Reporting for security issues.
          required: true
